services:

  postgres:
    image: postgres:17

    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge

    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7

  backend:

    build: backend

    ports:
      - "8000:8000"

    env_file:
      - backend/.env

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:

  postgres_data: