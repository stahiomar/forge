services:

  postgres:

    image: postgres:17

    environment:

      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:

    build: backend

    ports:
      - "8000:8000"

    env_file:
      - backend/.env

    depends_on:
      - postgres

volumes:

  postgres_data: