apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend

          image: forge-backend:latest

          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret

          ports:
            - containerPort: 8000